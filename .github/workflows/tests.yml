name: Tests

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests"
        required: false
        type: boolean
        default: false
      run_performance:
        description: "Run performance tests"
        required: false
        type: boolean
        default: false

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0

      - name: Sync dependencies
        run: uv sync --locked --all-extras

      - name: Run code quality checks
        run: |
          uv run ruff check .
          uv run ruff format . --check
          uv run basedpyright

      - name: Run unit and smoke tests with coverage
        run: |
          xvfb-run -a uv run pytest -m "unit or smoke" \
            --cov=sprite_model --cov=export.core --cov=managers \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Run integration tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration }}
        run: xvfb-run -a uv run pytest -m integration

      - name: Run performance tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_performance }}
        run: xvfb-run -a uv run pytest -m performance
