name: Tests

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      run_unit_smoke:
        description: "Run unit and smoke tests"
        required: false
        type: boolean
        default: true
      run_integration:
        description: "Run integration tests"
        required: false
        type: boolean
        default: false
      run_performance:
        description: "Run performance tests"
        required: false
        type: boolean
        default: false

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Code quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --all-extras

      - name: Run code quality checks
        run: |
          uv run ruff check .
          uv run ruff format . --check
          uv run basedpyright

  manual-tests:
    name: Manual test suite
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        (inputs.run_unit_smoke || inputs.run_integration || inputs.run_performance)
      }}
    needs: checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Qt test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0

      - name: Sync dependencies
        run: uv sync --locked --all-extras

      - name: Run unit and smoke tests
        if: ${{ inputs.run_unit_smoke }}
        run: xvfb-run -a uv run pytest -m "unit or smoke"

      - name: Run integration tests
        if: ${{ inputs.run_integration }}
        run: xvfb-run -a uv run pytest -m integration

      - name: Run performance tests
        if: ${{ inputs.run_performance }}
        run: xvfb-run -a uv run pytest -m performance
